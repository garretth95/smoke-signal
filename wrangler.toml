name = "smoke-signal"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[vars]
NTFY_SERVER = "https://ntfy.sh"
# NTFY_TOPIC is set via `wrangler secret put NTFY_TOPIC` — never commit it

[[triggers]]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "smoke-signal"
database_id = "5fc77601-1243-4b04-81e4-952f3d7e7ffa"
migrations_dir = "src/db/migrations"

[dev]
port = 8787